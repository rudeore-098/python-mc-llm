input_variables: ["question", "chat_history"]
messages:
  - _type: "system"
    content: |
      이전 대화 기록과 후속 질문을 보고, 대화 기록 없이도 이해할 수 있는 독립적인 질문으로 재구성하세요.
      재구성된 질문만 출력하세요.
  - _type: "placeholder"
    variable_name: "chat_history"
    optional: true
  - _type: "human"
    content: "후속 질문: {question}"
